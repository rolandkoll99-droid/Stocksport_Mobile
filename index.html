<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESV Grein | Stockpunkt-Wertung | 4-6 Spieler | 4-6 Punkte | 4-12 Kehren</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f2e1a 0%, #091f0e 100%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, system-ui, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 100%;
            height: 100%;
            background: #fefcf5;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
            box-shadow: 0 0 0 2px #d1e2c4;
        }

        .top-bar {
            grid-column: 1 / -1;
            background: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #deecd2;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }
        h1 {
            font-size: 1.2rem;
            background: #eef5e9;
            padding: 5px 16px;
            border-radius: 60px;
            color: #1b4d1b;
        }
        .settings-group {
            display: flex;
            gap: 10px;
            background: #f6faf3;
            padding: 5px 16px;
            border-radius: 60px;
            flex-wrap: wrap;
            align-items: center;
        }
        .team-name-input {
            border: 2px solid #c2d6b8;
            border-radius: 40px;
            padding: 5px 10px;
            font-weight: 600;
            width: 110px;
            text-align: center;
            font-size: 0.8rem;
        }
        .setting-select {
            padding: 5px 12px;
            border-radius: 40px;
            border: none;
            background: white;
            border: 1px solid #bbd4ae;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .apply-btn {
            background: #2d6a4f;
            color: white;
            cursor: pointer;
            padding: 5px 16px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
        }
        .speech-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #eef3ea;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
        }

        .input-left, .input-right {
            background: #fafdf8;
            overflow-y: auto;
            padding: 14px 10px;
        }
        .input-left { border-right: 2px solid #dae9ce; }
        .input-right { border-left: 2px solid #dae9ce; }

        .team-header {
            font-size: 1rem;
            font-weight: 800;
            text-align: center;
            background: #eef3ea;
            border-radius: 50px;
            padding: 6px;
            margin-bottom: 14px;
            color: #155f2e;
        }
        .stock-grid-side {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 5px 10px;
            border-radius: 50px;
            border: 1px solid #e0ecd6;
            transition: background 0.1s ease;
        }
        .stock-row.current-stock-bg {
            background: #c8e6c9 !important;
            border-left: 5px solid #2e7d32;
        }
        .stock-row.played-stock-bg {
            background: #ffcdd2 !important;
            border-left: 5px solid #c62828;
        }
        .stock-nr {
            font-weight: 800;
            width: 55px;
            font-size: 0.8rem;
            color: #2d692d;
        }
        .punkte-group {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }
        .side-punkt {
            min-width: 40px;
            min-height: 36px;
            background: white;
            border: 2px solid #cbdfc1;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .side-punkt:active { transform: scale(0.94); background: #eef5e8; }
        .side-value {
            background: #2c7a4d;
            color: white;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 800;
            min-width: 46px;
            text-align: center;
            font-size: 0.85rem;
        }
        .side-del {
            background: #fef1ec;
            border: 2px solid #efcdc2;
            border-radius: 40px;
            width: 38px;
            height: 36px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .center-hero {
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 14px 16px;
            overflow-y: auto;
        }

        .result-mega {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: stretch;
            margin: 5px 0 12px;
        }
        .result-card-big {
            flex: 1;
            background: #fafef5;
            border-radius: 40px;
            padding: 16px 12px;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            border: 1px solid #e2efda;
        }
        .result-team-big {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .current-round-big {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 6px 0;
            color: #1c691c;
            background: #ecf7e5;
            border-radius: 70px;
            padding: 6px;
        }
        .games-won-big {
            font-size: 0.8rem;
            background: #e9f2e2;
            border-radius: 60px;
            padding: 6px;
        }
        .games-number-big {
            font-size: 1.8rem;
            font-weight: 800;
            background: #1b4d1b;
            color: white;
            display: inline-block;
            padding: 2px 18px;
            border-radius: 60px;
            min-width: 60px;
        }

        .info-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            align-items: baseline;
            margin-top: 5px;
        }
        .current-stock-center {
            text-align: center;
            background: linear-gradient(135deg, #eef3e4, #e2ecd6);
            border-radius: 60px;
            padding: 4px 18px;
            display: inline-block;
        }
        .current-stock-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a6e3e;
        }
        .current-stock-number {
            font-size: 1.4rem;
            font-weight: 900;
            color: #1b4d1b;
            background: white;
            padding: 1px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-left: 8px;
            min-width: 55px;
        }
        .global-winner {
            background: #ffecb3;
            border-radius: 60px;
            padding: 6px 18px;
            margin-top: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .lock-info {
            font-size: 0.7rem;
            background: #f1e6cc;
            border-radius: 30px;
            padding: 3px 12px;
            display: inline-block;
        }

        .action-footer {
            grid-column: 1 / -1;
            background: white;
            border-top: 2px solid #dae8d0;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #f0f5eb;
            border: none;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-win { background: #ffdf8c; color: #1e4a1a; }
        .action-reset { background: #e6ede0; }
        .action-new { background: #1e5a2e; color: white; }
        .action-clear { background: #fadbd2; color: #a33929; }
        .action-pdf { background: #a43424; color: white; }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a472a;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 5000;
            font-weight: 600;
            font-size: 0.85rem;
            pointer-events: none;
        }

        body.game-finished .side-punkt,
        body.game-finished .side-del,
        body.game-finished .action-win,
        body.game-finished .action-reset {
            opacity: 0.5;
            pointer-events: none;
        }
        @media print {
            .action-footer, .top-bar .settings-group, .speech-toggle, .action-btn, .side-punkt, .side-del { display: none; }
            .dashboard { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="top-bar">
        <h1>🥌 ESV Grein · Stock & Kehren 🥌</h1>
        <div class="settings-group">
            <input type="text" id="teamANameSide" class="team-name-input" value="Team Nord">
            <span>🆚</span>
            <input type="text" id="teamBNameSide" class="team-name-input" value="Team Süd">
            <select id="kehrenSelect" class="setting-select">
                <option value="4">4 Kehren</option>
                <option value="5">5 Kehren</option>
                <option value="6" selected>6 Kehren</option>
                <option value="7">7 Kehren</option>
                <option value="8">8 Kehren</option>
                <option value="9">9 Kehren</option>
                <option value="10">10 Kehren</option>
                <option value="11">11 Kehren</option>
                <option value="12">12 Kehren</option>
            </select>
            <select id="playerCountSelect" class="setting-select">
                <option value="4">4 Spieler</option>
                <option value="5">5 Spieler</option>
                <option value="6" selected>6 Spieler</option>
            </select>
            <select id="stockPunkteSelect" class="setting-select">
                <option value="4">4 Stockpunkte</option>
                <option value="5">5 Stockpunkte</option>
                <option value="6" selected>6 Stockpunkte</option>
            </select>
            <button id="applyConfigBtn" class="apply-btn">Übernehmen</button>
            <div class="speech-toggle"><input type="checkbox" id="speechToggleSide" checked><label>🔊 Ansage</label></div>
        </div>
    </div>

    <div class="input-left">
        <div class="team-header"><span>🥌</span> <span id="leftTeamName">Team Nord</span></div>
        <div id="leftStocksPanel" class="stock-grid-side"></div>
        <div style="text-align:center; font-size:9px; margin-top:10px; color:#698a69;">👆 Stockpunkte (1..max)</div>
    </div>

    <div class="center-hero">
        <div class="result-mega">
            <div class="result-card-big" style="border-bottom: 5px solid #2c7a4d;">
                <div class="result-team-big"><span>🥌</span> <span id="centerTeamA">Team Nord</span></div>
                <div class="current-round-big" id="centerTotalA">0</div>
                <div class="games-won-big">🏆 GEWONNENE SPIELE 🏆<br><span class="games-number-big" id="centerGamesA">0</span></div>
            </div>
            <div class="result-card-big" style="border-bottom: 5px solid #c0392b;">
                <div class="result-team-big"><span id="centerTeamB">Team Süd</span> <span>🥌</span></div>
                <div class="current-round-big" id="centerTotalB">0</div>
                <div class="games-won-big">🏆 GEWONNENE SPIELE 🏆<br><span class="games-number-big" id="centerGamesB">0</span></div>
            </div>
        </div>

        <div class="info-row">
            <div class="current-stock-center">
                <span class="current-stock-label">🟢 AKTUELLER STOCK</span>
                <span class="current-stock-number" id="currentStockDisplay">1</span>
            </div>
            <div class="current-stock-center">
                <span class="current-stock-label">📋 AKTUELLE KEHRE</span>
                <span class="current-stock-number" id="currentKehreDisplay">1</span>
            </div>
            <div class="lock-info" id="lockInfoMitte" style="display: none;">🔒 Spiel beendet</div>
        </div>
        <div id="globalWinnerMsg" style="margin-top: 6px; text-align: center;"></div>
    </div>

    <div class="input-right">
        <div class="team-header"><span id="rightTeamName">Team Süd</span> <span>🥌</span></div>
        <div id="rightStocksPanel" class="stock-grid-side"></div>
        <div style="text-align:center; font-size:9px; margin-top:10px; color:#698a69;">👆 Stockpunkte (1..max)</div>
    </div>

    <div class="action-footer">
        <button class="action-btn action-win" id="winGameBtn">🏆 Manuell werten</button>
        <button class="action-btn action-reset" id="resetRoundBtn">🔄 Runde löschen</button>
        <button class="action-btn action-new" id="newGameBtn">✨ Neues Spiel</button>
        <button class="action-btn action-clear" id="resetTotalBtn">🗑️ Siege zurücksetzen</button>
        <button class="action-btn action-pdf" id="printPDFBtn">🖨️ Drucken (PDF)</button>
    </div>
</div>

<script>
    // -------------------- KONFIGURATION --------------------
    let anzahlKehren = 6;           // 4-12 Kehren (Wie viele Runden gespielt werden)
    let anzahlStoecke = 6;          // Anzahl Spieler = Stöcke pro Kehre (4-6)
    let maxStockPunkte = 6;         // maximaler Stockpunkt pro Eingabe (4-6)
    
    // Für jede Kehre werden die Punkte der Stöcke gespeichert: teamAKehren[kehre][stock] = punkte
    let teamAKehren = [];  // 2D: [kehre][stock]
    let teamBKehren = [];
    
    let gamesWonA = 0, gamesWonB = 0;
    let overallWinner = false;
    let teamAName = "Team Nord";
    let teamBName = "Team Süd";
    let speechEnabled = true;
    let autoEvaluationLock = false;
    let currentKehreIndex = 0;      // 0-basiert, welche Kehre gerade aktiv ist

    // DOM
    const centerTeamA = document.getElementById('centerTeamA');
    const centerTeamB = document.getElementById('centerTeamB');
    const centerTotalA = document.getElementById('centerTotalA');
    const centerTotalB = document.getElementById('centerTotalB');
    const centerGamesA = document.getElementById('centerGamesA');
    const centerGamesB = document.getElementById('centerGamesB');
    const currentStockSpan = document.getElementById('currentStockDisplay');
    const currentKehreSpan = document.getElementById('currentKehreDisplay');
    const globalWinnerMsgDiv = document.getElementById('globalWinnerMsg');
    const lockInfoMitte = document.getElementById('lockInfoMitte');

    const sumArray = arr => arr.reduce((a,b)=>a+b,0);
    
    // Initialisierung der Datenstruktur
    function initDataStructures() {
        teamAKehren = [];
        teamBKehren = [];
        for (let k = 0; k < anzahlKehren; k++) {
            teamAKehren.push(new Array(anzahlStoecke).fill(0));
            teamBKehren.push(new Array(anzahlStoecke).fill(0));
        }
    }
    
    // Aktuelle Kehre (1-basiert, die erste unvollständige oder aktuelle)
    function getCurrentKehreNumber() {
        if (overallWinner) return anzahlKehren;
        for (let k = 0; k < anzahlKehren; k++) {
            // Prüfen ob in dieser Kehre alle Stöcke noch leer sind (0,0)
            let allStocksEmpty = true;
            for (let s = 0; s < anzahlStoecke; s++) {
                if (teamAKehren[k][s] !== 0 || teamBKehren[k][s] !== 0) {
                    allStocksEmpty = false;
                    break;
                }
            }
            if (allStocksEmpty) return k + 1;
        }
        return anzahlKehren;
    }
    
    // Prüft ob die aktuelle Kehre komplett gespielt ist (alle Stöcke haben einen Wert >0 bei mindestens einem Team? eigentl. pro Stock min ein Punkt)
    function isCurrentKehreComplete() {
        const kehreIdx = getCurrentKehreNumber() - 1;
        if (kehreIdx >= anzahlKehren) return true;
        for (let s = 0; s < anzahlStoecke; s++) {
            if (teamAKehren[kehreIdx][s] === 0 && teamBKehren[kehreIdx][s] === 0) return false;
        }
        return true;
    }
    
    // Prüft ob alle Kehren komplett gespielt sind
    function isEveryKehrePlayed() {
        for (let k = 0; k < anzahlKehren; k++) {
            let hasValues = false;
            for (let s = 0; s < anzahlStoecke; s++) {
                if (teamAKehren[k][s] !== 0 || teamBKehren[k][s] !== 0) {
                    hasValues = true;
                    break;
                }
            }
            if (!hasValues) return false;
        }
        return true;
    }
    
    // Summe einer Kehre über alle Stöcke
    function sumKehre(teamKehren, kehreIdx) {
        return sumArray(teamKehren[kehreIdx]);
    }
    
    // Gesamtsumme über alle Kehren (aktuelles Spiel)
    function totalGamePoints(teamKehren) {
        let total = 0;
        for (let k = 0; k < anzahlKehren; k++) total += sumArray(teamKehren[k]);
        return total;
    }
    
    // Automatische Spielauswertung nach allen Kehren
    function autoEvaluateGameIfComplete() {
        if (overallWinner) return false;
        if (!isEveryKehrePlayed()) return false;
        if (autoEvaluationLock) return false;
        
        const totalA = totalGamePoints(teamAKehren);
        const totalB = totalGamePoints(teamBKehren);
        if (totalA === 0 && totalB === 0) return false;
        
        autoEvaluationLock = true;
        let winnerTeam = null;
        let isTie = false;
        if (totalA > totalB) winnerTeam = 'A';
        else if (totalB > totalA) winnerTeam = 'B';
        else isTie = true;
        
        const winnerName = winnerTeam === 'A' ? teamAName : (winnerTeam === 'B' ? teamBName : null);
        if (!isTie && winnerTeam) {
            speakText(`Alle ${anzahlKehren} Kehren gespielt. ${winnerName} gewinnt das Spiel mit ${totalA}:${totalB}.`);
            showToast(`🏆 Automatische Wertung: ${winnerName} gewinnt! (${totalA}:${totalB})`, 2800);
            if (winnerTeam === 'A') gamesWonA++;
            else gamesWonB++;
            updateCenterUI();
            if (!checkAndSetOverallWinner()) {
                // Nächste Runde: Alle Kehren zurücksetzen
                initDataStructures();
                renderFullPanels();
                updateCenterUI();
                showToast("🔄 Neue Runde – alle Kehren & Stöcke zurückgesetzt", 1800);
                speakText("Neue Runde gestartet.");
            } else {
                renderFullPanels();
                updateCenterUI();
            }
            autoEvaluationLock = false;
            return true;
        } else if (isTie) {
            speakText(`Alle ${anzahlKehren} Kehren gespielt. Unentschieden ${totalA}:${totalB}. Bitte manuell entscheiden.`);
            showToast(`⚠️ Unentschieden (${totalA}:${totalB}) – "Spiel gewinnen" nutzen.`, 4000);
            globalWinnerMsgDiv.innerHTML = `<div class="global-winner" style="background:#ffe0a3;">🤝 UNENTSCHIEDEN nach ${anzahlKehren} Kehren (${totalA}:${totalB}). Klicke "Spiel gewinnen" für Sieger.</div>`;
            autoEvaluationLock = false;
            return false;
        }
        autoEvaluationLock = false;
        return false;
    }
    
    function checkAndSetOverallWinner() {
        if (gamesWonA >= 2) {
            overallWinner = true;
            speakText(`🏆 Gesamtsieger: ${teamAName} hat zwei Spiele gewonnen!`);
            showToast(`🏆🏆🏆 ${teamAName} ist GESAMTSIEGER! 🏆🏆🏆`, 5000);
            updateCenterUI();
            return true;
        } else if (gamesWonB >= 2) {
            overallWinner = true;
            speakText(`🏆 Gesamtsieger: ${teamBName} hat zwei Spiele gewonnen!`);
            showToast(`🏆🏆🏆 ${teamBName} ist GESAMTSIEGER! 🏆🏆🏆`, 5000);
            updateCenterUI();
            return true;
        }
        return false;
    }
    
    function getCurrentStockInKehre() {
        if (overallWinner) return anzahlStoecke;
        const kehreIdx = getCurrentKehreNumber() - 1;
        if (kehreIdx >= anzahlKehren) return anzahlStoecke;
        for (let s = 0; s < anzahlStoecke; s++) {
            if (teamAKehren[kehreIdx][s] === 0 && teamBKehren[kehreIdx][s] === 0) return s + 1;
        }
        return anzahlStoecke;
    }
    
    function setPoints(team, kehreIdx, stockIdx, punkte) {
        if (overallWinner) { showToast("Spiel beendet – neues Spiel starten"); return; }
        if (punkte >= 1 && punkte <= maxStockPunkte) {
            let old = (team === 'A') ? teamAKehren[kehreIdx][stockIdx] : teamBKehren[kehreIdx][stockIdx];
            if (old !== punkte) {
                if (team === 'A') teamAKehren[kehreIdx][stockIdx] = punkte;
                else teamBKehren[kehreIdx][stockIdx] = punkte;
                const tname = (team === 'A') ? teamAName : teamBName;
                speakText(`${tname} erzielt bei Kehre ${kehreIdx+1}, Stock ${stockIdx+1} ${punkte===1 ? 'einen Punkt' : punkte+' Punkte'}.`);
                renderFullPanels();
                updateCenterUI();
                // Prüfen ob aktuelle Kehre vollständig => automatisch weiter? Nein, aber wenn alle Kehren voll => Spielende
                if (isEveryKehrePlayed() && !overallWinner && !autoEvaluationLock) {
                    autoEvaluateGameIfComplete();
                }
            }
        } else {
            showToast(`Punkte nur zwischen 1 und ${maxStockPunkte} erlaubt`, 1200);
        }
    }
    
    function deleteStock(team, kehreIdx, stockIdx) {
        if (overallWinner) { showToast("Spiel beendet"); return; }
        if (team === 'A') teamAKehren[kehreIdx][stockIdx] = 0;
        else teamBKehren[kehreIdx][stockIdx] = 0;
        renderFullPanels();
        updateCenterUI();
        showToast(`Punkt in Kehre ${kehreIdx+1}, Stock ${stockIdx+1} gelöscht`, 1000);
        if (globalWinnerMsgDiv.innerHTML.includes("UNENTSCHIEDEN")) globalWinnerMsgDiv.innerHTML = '';
    }
    
    function resetRound() {
        if (overallWinner) { showToast("Spiel vorbei, neues Spiel starten"); return; }
        initDataStructures();
        renderFullPanels();
        updateCenterUI();
        showToast("Alle Kehren & Stöcke gelöscht – beginne bei Kehre 1, Stock 1", 1800);
        speakText("Runde komplett zurückgesetzt.");
        autoEvaluationLock = false;
        if (globalWinnerMsgDiv.innerHTML.includes("UNENTSCHIEDEN")) globalWinnerMsgDiv.innerHTML = '';
    }
    
    function addWin(winner) {
        if (overallWinner) return;
        if (winner === 'A') gamesWonA++;
        else gamesWonB++;
        updateCenterUI();
        if (!checkAndSetOverallWinner()) {
            initDataStructures();
            renderFullPanels();
            updateCenterUI();
            showToast("Neue Runde gestartet – Kehren zurückgesetzt", 1500);
        } else {
            renderFullPanels();
            updateCenterUI();
        }
        autoEvaluationLock = false;
    }
    
    function winGameHandler() {
        if (overallWinner) { showToast("Spiel bereits entschieden"); return; }
        const totalA = totalGamePoints(teamAKehren);
        const totalB = totalGamePoints(teamBKehren);
        if (totalA === 0 && totalB === 0) { showToast("Keine Punkte eingetragen!"); return; }
        if (totalA === totalB) {
            const modalDiv = document.createElement('div');
            modalDiv.style.position='fixed'; modalDiv.style.top=0; modalDiv.style.left=0; modalDiv.style.right=0; modalDiv.style.bottom=0;
            modalDiv.style.background='rgba(0,0,0,0.7)'; modalDiv.style.display='flex'; modalDiv.style.alignItems='center'; modalDiv.style.justifyContent='center'; modalDiv.style.zIndex=9999;
            modalDiv.innerHTML = `<div style="background:white; border-radius: 48px; padding:20px; text-align:center;"><h3>🤝 Unentschieden</h3><p>${totalA}:${totalB} – Wer gewinnt das Spiel?</p><div style="display:flex; gap:12px; margin-top:16px;"><button id="chooseA" style="background:#2c7a4d; color:white; border:none; padding:6px 18px; border-radius:40px;">🥌 ${teamAName}</button><button id="chooseB" style="background:#c0392b; color:white; border:none; padding:6px 18px; border-radius:40px;">🥌 ${teamBName}</button><button id="cancelModal" style="background:#ccc;">Abbrechen</button></div></div>`;
            document.body.appendChild(modalDiv);
            modalDiv.querySelector('#chooseA').onclick = () => { addWin('A'); modalDiv.remove(); };
            modalDiv.querySelector('#chooseB').onclick = () => { addWin('B'); modalDiv.remove(); };
            modalDiv.querySelector('#cancelModal').onclick = () => modalDiv.remove();
        } else {
            const winner = totalA > totalB ? 'A' : 'B';
            const winnerName = winner === 'A' ? teamAName : teamBName;
            if (confirm(`${winnerName} gewinnt das Spiel (${totalA}:${totalB}). Bestätigen?`)) addWin(winner);
        }
    }
    
    function fullGameReset() {
        if (confirm("KOMPLETTRESET: Alle Punkte, Siege werden zurückgesetzt")) {
            initDataStructures();
            gamesWonA = 0; gamesWonB = 0; overallWinner = false; autoEvaluationLock = false;
            updateCenterUI();
            renderFullPanels();
            globalWinnerMsgDiv.innerHTML = '';
            showToast("Neues Spiel gestartet – Kehre 1, Stock 1", 1800);
            speakText("Neues Spiel gestartet.");
            document.body.classList.remove('game-finished');
        }
    }
    
    function resetScoreOnly() {
        if (confirm("Nur gewonnene Spiele zurücksetzen? (Stockpunkte bleiben, Gesamtsieger entfernt)")) {
            gamesWonA = 0; gamesWonB = 0; overallWinner = false; autoEvaluationLock = false;
            updateCenterUI();
            renderFullPanels();
            globalWinnerMsgDiv.innerHTML = '';
            showToast("Siege zurückgesetzt", 1300);
            speakText("Gewonnene Spiele zurückgesetzt.");
            document.body.classList.remove('game-finished');
        }
    }
    
    function applyConfiguration() {
        let neueKehren = parseInt(document.getElementById('kehrenSelect').value);
        let neueSpieler = parseInt(document.getElementById('playerCountSelect').value);
        let neueMaxPunkte = parseInt(document.getElementById('stockPunkteSelect').value);
        if (neueKehren !== anzahlKehren || neueSpieler !== anzahlStoecke || neueMaxPunkte !== maxStockPunkte) {
            if (confirm(`Konfiguration ändern: ${neueKehren} Kehren, ${neueSpieler} Spieler/Stöcke, max. ${neueMaxPunkte} Stockpunkte? Aktuelle Runde wird zurückgesetzt.`)) {
                anzahlKehren = neueKehren;
                anzahlStoecke = neueSpieler;
                maxStockPunkte = neueMaxPunkte;
                initDataStructures();
                gamesWonA = 0; gamesWonB = 0; overallWinner = false; autoEvaluationLock = false;
                updateCenterUI();
                renderFullPanels();
                globalWinnerMsgDiv.innerHTML = '';
                showToast(`Einstellungen: ${anzahlKehren} Kehren, ${anzahlStoecke} Spieler, max ${maxStockPunkte} Punkte`, 2000);
                speakText(`Neue Konfiguration aktiv.`);
            }
        } else {
            showToast("Bereits aktiv", 1000);
        }
    }
    
    function updateCenterUI() {
        const totalA = totalGamePoints(teamAKehren);
        const totalB = totalGamePoints(teamBKehren);
        centerTotalA.innerText = totalA;
        centerTotalB.innerText = totalB;
        centerGamesA.innerText = gamesWonA;
        centerGamesB.innerText = gamesWonB;
        
        const currentKehre = getCurrentKehreNumber();
        const currentStock = getCurrentStockInKehre();
        currentKehreSpan.innerText = overallWinner ? "🏁" : currentKehre;
        currentStockSpan.innerText = overallWinner ? "🏆" : currentStock;
        
        if (overallWinner) {
            const winnerName = gamesWonA >= 2 ? teamAName : teamBName;
            globalWinnerMsgDiv.innerHTML = `<div class="global-winner">🏆🏆🏆 ${winnerName} hat 2 Spiele gewonnen & ist GESAMTSIEGER! 🏆🏆🏆</div>`;
            lockInfoMitte.style.display = 'inline-block';
            document.body.classList.add('game-finished');
        } else {
            lockInfoMitte.style.display = 'none';
            document.body.classList.remove('game-finished');
            if (isEveryKehrePlayed() && !autoEvaluationLock) {
                autoEvaluateGameIfComplete();
            } else if (!isEveryKehrePlayed() && globalWinnerMsgDiv.innerHTML.includes("UNENTSCHIEDEN")) {
                globalWinnerMsgDiv.innerHTML = '';
            }
        }
        updateRowColors();
    }
    
    function updateRowColors() {
        const currentKehre = getCurrentKehreNumber() - 1;
        const leftRows = document.querySelectorAll('#leftStocksPanel .stock-row');
        const rightRows = document.querySelectorAll('#rightStocksPanel .stock-row');
        // Jede Zeile repräsentiert einen Stock der aktuellen Kehre? Unser Panel zeigt immer die AKTUELLE Kehre an.
        // Also müssen wir die Farben basierend auf dem Stock-Index innerhalb der aktuellen Kehre setzen.
        if (overallWinner) return;
        const currentStockIdx = getCurrentStockInKehre() - 1;
        for (let i = 0; i < leftRows.length; i++) {
            leftRows[i].classList.remove('current-stock-bg', 'played-stock-bg');
            rightRows[i].classList.remove('current-stock-bg', 'played-stock-bg');
            if (i === currentStockIdx) {
                leftRows[i].classList.add('current-stock-bg');
                rightRows[i].classList.add('current-stock-bg');
            } else if (i < currentStockIdx) {
                leftRows[i].classList.add('played-stock-bg');
                rightRows[i].classList.add('played-stock-bg');
            }
        }
    }
    
    function renderFullPanels() {
        document.getElementById('leftTeamName').innerHTML = teamAName;
        document.getElementById('rightTeamName').innerHTML = teamBName;
        centerTeamA.innerText = teamAName;
        centerTeamB.innerText = teamBName;
        
        const currentKehreIdx = getCurrentKehreNumber() - 1;
        if (currentKehreIdx >= anzahlKehren) return;
        
        const leftPanel = document.getElementById('leftStocksPanel');
        leftPanel.innerHTML = '';
        const rightPanel = document.getElementById('rightStocksPanel');
        rightPanel.innerHTML = '';
        
        for (let s = 0; s < anzahlStoecke; s++) {
            // Linke Seite (Team A)
            const rowLeft = document.createElement('div'); rowLeft.className = 'stock-row';
            let btnsHtml = '';
            for (let p = 1; p <= maxStockPunkte; p++) btnsHtml += `<button class="side-punkt" data-val="${p}">${p}</button>`;
            rowLeft.innerHTML = `<div class="stock-nr">Stock ${s+1}</div><div class="punkte-group">
                ${btnsHtml}
                <span class="side-value">${teamAKehren[currentKehreIdx][s] || 0}</span>
                <button class="side-del">🗑️</button>
            </div>`;
            rowLeft.querySelectorAll('.side-punkt').forEach(btn => {
                const val = parseInt(btn.getAttribute('data-val'));
                btn.addEventListener('click', () => setPoints('A', currentKehreIdx, s, val));
            });
            rowLeft.querySelector('.side-del').addEventListener('click', () => deleteStock('A', currentKehreIdx, s));
            leftPanel.appendChild(rowLeft);
            
            // Rechte Seite (Team B)
            const rowRight = document.createElement('div'); rowRight.className = 'stock-row';
            rowRight.innerHTML = `<div class="stock-nr">Stock ${s+1}</div><div class="punkte-group">
                ${btnsHtml}
                <span class="side-value">${teamBKehren[currentKehreIdx][s] || 0}</span>
                <button class="side-del">🗑️</button>
            </div>`;
            rowRight.querySelectorAll('.side-punkt').forEach(btn => {
                const val = parseInt(btn.getAttribute('data-val'));
                btn.addEventListener('click', () => setPoints('B', currentKehreIdx, s, val));
            });
            rowRight.querySelector('.side-del').addEventListener('click', () => deleteStock('B', currentKehreIdx, s));
            rightPanel.appendChild(rowRight);
        }
        updateRowColors();
    }
    
    function speakText(text) {
        if (!speechEnabled) return;
        if ('speechSynthesis' in window) {
            try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=0.9; window.speechSynthesis.speak(u); } catch(e) {}
        }
    }
    function showToast(msg, duration=2000) {
        let t = document.getElementById('dynamicToast');
        if(!t){ t=document.createElement('div'); t.id='dynamicToast'; t.className='toast-msg'; document.body.appendChild(t); }
        t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',duration);
    }
    
    // Event binding
    document.getElementById('applyConfigBtn').onclick = applyConfiguration;
    document.getElementById('teamANameSide').oninput = (e) => { teamAName = e.target.value.trim() || "Team Nord"; renderFullPanels(); updateCenterUI(); };
    document.getElementById('teamBNameSide').oninput = (e) => { teamBName = e.target.value.trim() || "Team Süd"; renderFullPanels(); updateCenterUI(); };
    document.getElementById('speechToggleSide').onchange = (e) => speechEnabled = e.target.checked;
    document.getElementById('winGameBtn').onclick = winGameHandler;
    document.getElementById('resetRoundBtn').onclick = resetRound;
    document.getElementById('newGameBtn').onclick = fullGameReset;
    document.getElementById('resetTotalBtn').onclick = resetScoreOnly;
    document.getElementById('printPDFBtn').onclick = () => window.print();
    
    function init() {
        anzahlKehren = 6;
        anzahlStoecke = 6;
        maxStockPunkte = 6;
        initDataStructures();
        gamesWonA = 0; gamesWonB = 0; overallWinner = false;
        teamAName = "Team Nord"; teamBName = "Team Süd";
        document.getElementById('teamANameSide').value = teamAName;
        document.getElementById('teamBNameSide').value = teamBName;
        document.getElementById('kehrenSelect').value = "6";
        document.getElementById('playerCountSelect').value = "6";
        document.getElementById('stockPunkteSelect').value = "6";
        speechEnabled = true;
        document.getElementById('speechToggleSide').checked = true;
        renderFullPanels();
        updateCenterUI();
    }
    init();
</script>
</body>
</html>
